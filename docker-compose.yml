services:

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: docker-test-web
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      api:
        condition: service_started
    networks:
      - backend

  api:
    build:
      context: ./api
    container_name: docker-test-nest-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      REDIS_URL: ${REDIS_URL}
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - backend
      
networks:
  backend:
    driver: bridge
